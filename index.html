<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Devo Daily — Proverbs &amp; Psalms</title>

<!-- Typefaces -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />

<style>
/* ──────────────────────────────────────────────────
   CSS CUSTOM PROPERTIES — light (parchment) theme
────────────────────────────────────────────────── */
:root {
  --parchment:   #f5efe0;
  --parchment-2: #ede4cc;
  --parchment-3: #e0d4b0;
  --gold:        #b8860b;
  --gold-light:  #d4a520;
  --gold-pale:   #f0d070;
  --ink:         #1a1209;
  --ink-mid:     #3d2b1f;
  --ink-light:   #6b4c33;
  --red:         #8b1a1a;
  --red-light:   #c0392b;
  --shadow:      rgba(26,18,9,0.18);
  --border:      #b8860b;
  --row-done-bg: rgba(184,134,11,0.07);
  --row-hover:   rgba(184,134,11,0.10);
  --modal-bg:    rgba(26,18,9,0.72);
  --note-bg:     #f9f3e3;
  --note-border: #cdb87a;
  --progress-bg: #ddd0a8;
  --progress-fill: #b8860b;
  --card-bg:     #f0e8ce;
  --card-border: #c9a84c;
  --scrollbar-thumb: #c9a84c;
  --font-display: 'Cinzel', serif;
  --font-body:    'Crimson Pro', Georgia, serif;
  --font-fell:    'IM Fell English', Georgia, serif;
}

/* ──────────────────────────────────────────────────
   DARK MODE
────────────────────────────────────────────────── */
[data-theme="dark"] {
  --parchment:   #1a1209;
  --parchment-2: #231910;
  --parchment-3: #2e2112;
  --gold:        #d4a520;
  --gold-light:  #e8c040;
  --gold-pale:   #b8860b;
  --ink:         #f5efe0;
  --ink-mid:     #e8d8b8;
  --ink-light:   #c4a87a;
  --red:         #e05050;
  --red-light:   #e87070;
  --shadow:      rgba(0,0,0,0.5);
  --border:      #7a5c1a;
  --row-done-bg: rgba(212,165,32,0.08);
  --row-hover:   rgba(212,165,32,0.12);
  --modal-bg:    rgba(0,0,0,0.80);
  --note-bg:     #2a1e0e;
  --note-border: #6a4c20;
  --progress-bg: #2e2112;
  --progress-fill: #d4a520;
  --card-bg:     #231910;
  --card-border: #7a5c1a;
  --scrollbar-thumb: #7a5c1a;
}

/* ──────────────────────────────────────────────────
   RESET & BASE
────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background-color: var(--parchment);
  color: var(--ink);
  min-height: 100vh;
  transition: background-color .3s, color .3s;
}

/* scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--parchment-2); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

/* ──────────────────────────────────────────────────
   PAGE WRAPPER
────────────────────────────────────────────────── */
.page {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 16px 60px;
  position: relative;
}

/* ──────────────────────────────────────────────────
   CORNER ORNAMENTS
────────────────────────────────────────────────── */
.page::before,
.page::after,
.corner-bl,
.corner-br {
  content: '✦';
  position: fixed;
  font-size: 22px;
  color: var(--gold);
  opacity: 0.55;
  pointer-events: none;
  z-index: 0;
}
.page::before  { top: 14px; left: 14px; }
.page::after   { top: 14px; right: 14px; }
.corner-bl     { bottom: 14px; left: 14px; }
.corner-br     { bottom: 14px; right: 14px; }

/* ──────────────────────────────────────────────────
   HEADER
────────────────────────────────────────────────── */
header {
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--border);
  position: relative;
}

header::after {
  content: '';
  display: block;
  height: 1px;
  background: var(--border);
  margin-top: 6px;
  opacity: 0.4;
}

.header-title {
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: .06em;
  text-shadow: 1px 1px 3px var(--shadow);
  margin-bottom: 4px;
}

.header-subtitle {
  font-family: var(--font-fell);
  font-style: italic;
  font-size: 1rem;
  color: var(--ink-light);
  letter-spacing: .04em;
}

/* ──────────────────────────────────────────────────
   TOOLBAR  (dropdowns + dark-mode + print)
────────────────────────────────────────────────── */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.toolbar select {
  font-family: var(--font-display);
  font-size: .85rem;
  background: var(--parchment-2);
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  cursor: pointer;
  outline: none;
  transition: border-color .2s;
}
.toolbar select:hover { border-color: var(--gold-light); }

.icon-btn {
  font-family: var(--font-body);
  font-size: 1rem;
  background: var(--parchment-2);
  color: var(--ink-mid);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 11px;
  cursor: pointer;
  transition: background .2s, color .2s, border-color .2s;
  line-height: 1;
}
.icon-btn:hover {
  background: var(--gold);
  color: var(--parchment);
  border-color: var(--gold-light);
}

/* ──────────────────────────────────────────────────
   STAT CARDS
────────────────────────────────────────────────── */
.stats-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 18px;
  justify-content: center;
}

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: 8px 18px;
  text-align: center;
  min-width: 110px;
  box-shadow: 0 2px 6px var(--shadow);
}
.stat-num {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.1;
}
.stat-label {
  font-family: var(--font-fell);
  font-style: italic;
  font-size: .78rem;
  color: var(--ink-light);
  letter-spacing: .03em;
}

/* ──────────────────────────────────────────────────
   PROGRESS BAR
────────────────────────────────────────────────── */
.progress-wrap {
  margin-bottom: 22px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-fell);
  font-style: italic;
  font-size: .82rem;
  color: var(--ink-light);
  margin-bottom: 4px;
}
.progress-track {
  height: 10px;
  background: var(--progress-bg);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid var(--note-border);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 5px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* ──────────────────────────────────────────────────
   TABLE
────────────────────────────────────────────────── */
.table-wrap {
  border: 2px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 4px 16px var(--shadow);
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  font-family: var(--font-display);
  font-size: .78rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--parchment);
  background: var(--gold);
  padding: 10px 12px;
  text-align: left;
  border-bottom: 2px solid var(--border);
}
thead th:last-child { text-align: center; }

tbody tr {
  border-bottom: 1px solid var(--parchment-3);
  transition: background .15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--row-hover); }
tbody tr.done  { background: var(--row-done-bg); }

td {
  padding: 9px 12px;
  vertical-align: top;
  font-size: .95rem;
  color: var(--ink-mid);
}

/* Day number column */
.col-day {
  font-family: var(--font-display);
  font-size: .9rem;
  font-weight: 600;
  color: var(--gold);
  white-space: nowrap;
  width: 54px;
}

/* Date column */
.col-date {
  font-family: var(--font-fell);
  font-style: italic;
  font-size: .85rem;
  color: var(--ink-light);
  white-space: nowrap;
  width: 90px;
}

/* Scripture columns */
.col-prov, .col-psalm {
  font-family: var(--font-body);
  font-size: .93rem;
}
.col-psalm {
  color: var(--ink-light);
  font-style: italic;
}

/* Action cell */
.col-actions {
  width: 70px;
  text-align: center;
  white-space: nowrap;
}

/* Verse fetch button */
.btn-verse {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.05rem;
  color: var(--red);
  padding: 2px 3px;
  line-height: 1;
  transition: color .2s, transform .15s;
  vertical-align: middle;
}
.btn-verse:hover { color: var(--red-light); transform: scale(1.2); }

/* Check circle */
.check-circle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  background: transparent;
  transition: background .2s, border-color .2s, box-shadow .2s;
  font-size: 14px;
  color: transparent;
  vertical-align: middle;
  flex-shrink: 0;
  margin-left: 6px;
}
.check-circle:hover {
  border-color: var(--gold-light);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.18);
}
.check-circle.checked {
  background: var(--gold);
  border-color: var(--gold-light);
  color: var(--parchment);
}
.check-circle.checked::after { content: '✓'; }

/* Today highlight */
tbody tr.today-row > td:first-child::before {
  content: '▸ ';
  color: var(--red);
}
tbody tr.today-row { outline: 2px solid var(--red); outline-offset: -2px; }

/* Done row text muted */
tbody tr.done .col-prov,
tbody tr.done .col-psalm,
tbody tr.done .col-date {
  opacity: .55;
}

/* ──────────────────────────────────────────────────
   NOTES
────────────────────────────────────────────────── */
.note-toggle {
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font-fell);
  font-style: italic;
  font-size: .78rem;
  color: var(--ink-light);
  padding: 2px 0;
  margin-top: 4px;
  display: block;
  transition: color .2s;
}
.note-toggle:hover { color: var(--gold); }
.note-toggle.open { color: var(--gold-light); }

.note-area {
  display: none;
  margin-top: 6px;
}
.note-area.open { display: block; }

.note-field {
  width: 100%;
  min-height: 56px;
  font-family: var(--font-fell);
  font-size: .88rem;
  background: var(--note-bg);
  color: var(--ink);
  border: 1px solid var(--note-border);
  border-radius: 4px;
  padding: 6px 8px;
  resize: vertical;
  outline: none;
  transition: border-color .2s;
}
.note-field:focus { border-color: var(--gold-light); }
.note-field::placeholder { color: var(--ink-light); opacity: .6; }

/* ──────────────────────────────────────────────────
   VERSE MODAL
────────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--modal-bg);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: var(--parchment);
  border: 3px double var(--border);
  border-radius: 8px;
  max-width: 620px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 28px 32px;
  box-shadow: 0 8px 32px var(--shadow);
  position: relative;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  color: var(--gold);
  letter-spacing: .06em;
  margin-bottom: 14px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.modal-body {
  font-family: var(--font-fell);
  font-size: .97rem;
  line-height: 1.75;
  color: var(--ink-mid);
  white-space: pre-wrap;
}

/* drop cap on first verse paragraph */
.modal-body p:first-of-type::first-letter {
  font-family: var(--font-display);
  font-size: 3em;
  float: left;
  line-height: .8;
  margin-right: 6px;
  margin-top: 4px;
  color: var(--red);
  font-weight: 700;
}

.modal-body .verse-num {
  font-family: var(--font-display);
  font-size: .7em;
  font-weight: 600;
  color: var(--red);
  vertical-align: super;
  margin-right: 2px;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 14px;
  background: none;
  border: none;
  font-size: 1.4rem;
  color: var(--ink-light);
  cursor: pointer;
  line-height: 1;
  transition: color .2s;
}
.modal-close:hover { color: var(--red); }

.modal-loading {
  text-align: center;
  font-family: var(--font-fell);
  font-style: italic;
  color: var(--ink-light);
  padding: 20px 0;
}

/* ──────────────────────────────────────────────────
   PRINT STYLES
────────────────────────────────────────────────── */
@media print {
  .toolbar, .stats-bar, .progress-wrap,
  .col-actions, .note-toggle, .note-area,
  .corner-bl, .corner-br,
  .modal-overlay { display: none !important; }

  body { background: #fff; color: #000; }
  .page { max-width: 100%; padding: 10px; }
  .table-wrap { box-shadow: none; border: 1px solid #999; }
  thead th { background: #d4a520 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tbody tr.done { opacity: .5; }
  .header-title { color: #b8860b; }
}

/* ──────────────────────────────────────────────────
   RESPONSIVE
────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .col-date { display: none; }
  td { padding: 7px 8px; font-size: .88rem; }
  .modal-box { padding: 20px 16px; }
}
</style>
</head>

</div><!-- /.page -->

/* ════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════ */
const today = new Date();
let viewYear  = today.getFullYear();
let viewMonth = today.getMonth(); // 0-based

/* ════════════════════════════════════════════════════════
   LOCAL STORAGE HELPERS
════════════════════════════════════════════════════════ */
function storageKey(year, month, day, type) {
  return `devo_${year}_${month}_${day}_${type}`;
}
function isDone(year, month, day) {
  return localStorage.getItem(storageKey(year, month, day, 'done')) === '1';
}
function setDone(year, month, day, val) {
  if (val) localStorage.setItem(storageKey(year, month, day, 'done'), '1');
  else localStorage.removeItem(storageKey(year, month, day, 'done'));
}
function getNote(year, month, day) {
  return localStorage.getItem(storageKey(year, month, day, 'note')) || '';
}
function setNote(year, month, day, val) {
  if (val) localStorage.setItem(storageKey(year, month, day, 'note'), val);
  else localStorage.removeItem(storageKey(year, month, day, 'note'));
}

/* Dark mode pref */
function getDarkPref() { return localStorage.getItem('devo_dark') === '1'; }
function setDarkPref(v) { localStorage.setItem('devo_dark', v ? '1' : '0'); }

/* ════════════════════════════════════════════════════════
   DARK MODE
════════════════════════════════════════════════════════ */
function applyDark(on) {
  document.documentElement.setAttribute('data-theme', on ? 'dark' : 'light');
  document.getElementById('btn-dark').textContent = on ? '☀' : '☽';
}
applyDark(getDarkPref());
document.getElementById('btn-dark').addEventListener('click', () => {
  const now = document.documentElement.getAttribute('data-theme') === 'dark';
  applyDark(!now);
  setDarkPref(!now);
});

/* ════════════════════════════════════════════════════════
   PSALM DISTRIBUTION
════════════════════════════════════════════════════════ */
const TOTAL_PSALMS = 150;

/**
 * Returns an array (length = daysInMonth) where each element is an
 * array of Psalm numbers assigned to that day (1-indexed day → index 0).
 */
function distributePsalms(daysInMonth) {
  const result = Array.from({ length: daysInMonth }, () => []);
  // Each day gets floor(150/days) psalms; the first (150 % days) days get one extra
  const base  = Math.floor(TOTAL_PSALMS / daysInMonth);
  const extra = TOTAL_PSALMS % daysInMonth;
  let psalmIdx = 1; // psalms are 1-150
  for (let d = 0; d < daysInMonth; d++) {
    const count = base + (d < extra ? 1 : 0);
    for (let i = 0; i < count; i++) {
      result[d].push(psalmIdx++);
    }
  }
  return result;
}

function psalmLabel(psalms) {
  if (!psalms || psalms.length === 0) return '—';
  if (psalms.length === 1) return `Psalm ${psalms[0]}`;
  // Show range if contiguous
  if (psalms[psalms.length - 1] - psalms[0] === psalms.length - 1) {
    return `Psalms ${psalms[0]}–${psalms[psalms.length - 1]}`;
  }
  return psalms.join(', ');
}

/* ════════════════════════════════════════════════════════
   MONTH CALENDAR BUILD
════════════════════════════════════════════════════════ */
const MONTH_NAMES = [
  'January','February','March','April','May','June',
  'July','August','September','October','November','December'
];
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function daysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

function formatDate(year, month, day) {
  const d = new Date(year, month, day);
  return `${DAY_NAMES[d.getDay()]} ${day}`;
}

/* ════════════════════════════════════════════════════════
   STREAK COMPUTATION (backward from today)
════════════════════════════════════════════════════════ */
function computeStreak() {
  let streak = 0;
  const d = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  while (true) {
    const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
    if (isDone(y, m, day)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

/* ════════════════════════════════════════════════════════
   STATS UPDATE
════════════════════════════════════════════════════════ */
function updateStats() {
  const total = daysInMonth(viewYear, viewMonth);
  let done = 0;
  for (let d = 1; d <= total; d++) {
    if (isDone(viewYear, viewMonth, d)) done++;
  }
  const remain = total - done;
  const pct = total ? Math.round(done / total * 100) : 0;
  const streak = computeStreak();

  document.getElementById('stat-done').textContent   = done;
  document.getElementById('stat-remain').textContent = remain;
  document.getElementById('stat-streak').textContent = streak + ' 🔥';
  document.getElementById('stat-pct').textContent    = pct + '%';

  document.getElementById('prog-label-left').textContent  = `${MONTH_NAMES[viewMonth]} ${viewYear}`;
  document.getElementById('prog-label-right').textContent = `${done} / ${total}`;

  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  document.getElementById('progress-track').setAttribute('aria-valuenow', pct);
}

/* ════════════════════════════════════════════════════════
   TABLE RENDER
════════════════════════════════════════════════════════ */
function renderTable() {
  const total   = daysInMonth(viewYear, viewMonth);
  const psalms  = distributePsalms(total);
  const tbody   = document.getElementById('table-body');
  tbody.innerHTML = '';

  const todayY = today.getFullYear(), todayM = today.getMonth(), todayD = today.getDate();

  for (let d = 1; d <= total; d++) {
    const provChap  = d <= 31 ? d : null; // Proverbs has 31 chapters
    const dayPsalms = psalms[d - 1];
    const done      = isDone(viewYear, viewMonth, d);
    const note      = getNote(viewYear, viewMonth, d);
    const isToday   = (viewYear === todayY && viewMonth === todayM && d === todayD);

    const tr = document.createElement('tr');
    if (done)    tr.classList.add('done');
    if (isToday) tr.classList.add('today-row');
    tr.dataset.day = d;

    // ── Day number ──
    const tdDay = document.createElement('td');
    tdDay.className = 'col-day';
    tdDay.textContent = d;

    // ── Date ──
    const tdDate = document.createElement('td');
    tdDate.className = 'col-date';
    tdDate.textContent = formatDate(viewYear, viewMonth, d);

    // ── Proverbs ──
    const tdProv = document.createElement('td');
    tdProv.className = 'col-prov';
    if (provChap) {
      tdProv.innerHTML =
        `<button class="btn-verse" data-book="proverbs" data-chap="${provChap}"
           title="Read Proverbs ${provChap}" aria-label="Read Proverbs chapter ${provChap}">☩</button> ` +
        `Proverbs ${provChap}`;
      // Note toggle below the scripture
      const noteToggle = document.createElement('button');
      noteToggle.className = 'note-toggle' + (note ? ' open' : '');
      noteToggle.textContent = note ? '▾ note' : '▸ add note';
      noteToggle.setAttribute('aria-expanded', note ? 'true' : 'false');
      noteToggle.setAttribute('aria-label', `Toggle note for day ${d}`);

      const noteArea = document.createElement('div');
      noteArea.className = 'note-area' + (note ? ' open' : '');

      const noteField = document.createElement('textarea');
      noteField.className = 'note-field';
      noteField.placeholder = 'Reflection…';
      noteField.value = note;
      noteField.setAttribute('aria-label', `Reflection note for day ${d}`);

      // Auto-save note
      noteField.addEventListener('input', () => {
        setNote(viewYear, viewMonth, d, noteField.value.trim());
        updateStats();
      });

      // Toggle note area
      noteToggle.addEventListener('click', () => {
        const open = noteArea.classList.toggle('open');
        noteToggle.classList.toggle('open', open);
        noteToggle.textContent = open ? '▾ note' : '▸ add note';
        noteToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open) noteField.focus();
      });

      noteArea.appendChild(noteField);
      tdProv.appendChild(document.createElement('br'));
      tdProv.appendChild(noteToggle);
      tdProv.appendChild(noteArea);
    } else {
      tdProv.textContent = '—';
    }

    // ── Psalms ──
    const tdPsalm = document.createElement('td');
    tdPsalm.className = 'col-psalm';
    const psLabel = psalmLabel(dayPsalms);
    // Use first psalm for the verse button
    const firstPsalm = dayPsalms[0] || null;
    if (firstPsalm) {
      tdPsalm.innerHTML =
        `<button class="btn-verse" data-book="psalms" data-chap="${firstPsalm}"
           title="Read ${psLabel}" aria-label="Read ${psLabel}">☩</button> ` +
        psLabel;
    } else {
      tdPsalm.textContent = psLabel;
    }

    // ── Actions (check circle) ──
    const tdAction = document.createElement('td');
    tdAction.className = 'col-actions';
    const circle = document.createElement('button');
    circle.className = 'check-circle' + (done ? ' checked' : '');
    circle.setAttribute('aria-label', `Mark day ${d} as ${done ? 'undone' : 'done'}`);
    circle.setAttribute('aria-pressed', done ? 'true' : 'false');
    circle.addEventListener('click', () => {
      const nowDone = !isDone(viewYear, viewMonth, d);
      setDone(viewYear, viewMonth, d, nowDone);
      circle.classList.toggle('checked', nowDone);
      circle.setAttribute('aria-pressed', nowDone ? 'true' : 'false');
      circle.setAttribute('aria-label', `Mark day ${d} as ${nowDone ? 'undone' : 'done'}`);
      tr.classList.toggle('done', nowDone);
      updateStats();
    });

    tdAction.appendChild(circle);
    tr.append(tdDay, tdDate, tdProv, tdPsalm, tdAction);
    tbody.appendChild(tr);
  }

  // Attach verse-button listeners via delegation
  tbody.querySelectorAll('.btn-verse').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openModal(btn.dataset.book, parseInt(btn.dataset.chap));
    });
  });

  updateStats();

  // Scroll today into view
  const todayRow = tbody.querySelector('.today-row');
  if (todayRow) {
    setTimeout(() => todayRow.scrollIntoView({ block: 'center', behavior: 'smooth' }), 150);
  }
}

/* ════════════════════════════════════════════════════════
   DROPDOWNS
════════════════════════════════════════════════════════ */
function buildDropdowns() {
  const selMonth = document.getElementById('sel-month');
  const selYear  = document.getElementById('sel-year');

  MONTH_NAMES.forEach((name, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = name;
    if (i === viewMonth) opt.selected = true;
    selMonth.appendChild(opt);
  });

  const curYear = today.getFullYear();
  for (let y = curYear - 5; y <= curYear + 5; y++) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    if (y === viewYear) opt.selected = true;
    selYear.appendChild(opt);
  }

  selMonth.addEventListener('change', () => {
    viewMonth = parseInt(selMonth.value);
    renderTable();
  });
  selYear.addEventListener('change', () => {
    viewYear = parseInt(selYear.value);
    renderTable();
  });
}

/* ════════════════════════════════════════════════════════
   VERSE MODAL
════════════════════════════════════════════════════════ */
async function fetchChapter(book, chapter) {
  const url = `https://bible-api.com/${book}+${chapter}?translation=asv`;
  const resp = await fetch(url, { signal: AbortSignal.timeout(7000) });
  if (!resp.ok) throw new Error('Network response not ok');
  const data = await resp.json();
  return data.verses || [];
}

function fallbackText(book, chapter) {
  if (book === 'proverbs') return PROV_KEY_VERSES[chapter] || 'Key verse unavailable.';
  if (book === 'psalms')   return PSALM_KEY_VERSES[chapter] || 'Key verse unavailable.';
  return '';
}

function renderVerses(verses) {
  if (!verses || !verses.length) return '';
  return '<p>' + verses.map(v =>
    `<span class="verse-num">${v.verse}</span>${v.text.trim()}`
  ).join(' ') + '</p>';
}

async function openModal(book, chapter) {
  const overlay = document.getElementById('modal-overlay');
  const title   = document.getElementById('modal-title');
  const body    = document.getElementById('modal-body');

  const bookTitle = book === 'proverbs' ? 'Proverbs' : 'Psalms';
  title.textContent = `${bookTitle} ${chapter}`;
  body.innerHTML = '<div class="modal-loading">Fetching passage…</div>';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const verses = await fetchChapter(book, chapter);
    if (verses.length) {
      body.innerHTML = renderVerses(verses);
    } else {
      throw new Error('No verses');
    }
  } catch {
    // Graceful fallback
    const fallback = fallbackText(book, chapter);
    body.innerHTML = `<p><em>Could not load live text — showing key verse:</em></p><p>${fallback}</p>`;
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

/* ════════════════════════════════════════════════════════
   PRINT

document.getElementById('btn-print').addEventListener('click', () => {
  window.print();

/* ════════════════════════════════════════════════════════

buildDropdowns();
